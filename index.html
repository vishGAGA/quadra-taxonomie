<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUADRA — Vizualizare Taxonomie</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --border:#334155;
    --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --green:#34d399;
    --amber:#fbbf24; --leaf:#a78bfa; --p-col:#f472b6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden;}
  header{padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  header h1{font-size:17px; font-weight:600; color:var(--accent); white-space:nowrap;}
  header .stats{font-size:12px; color:var(--muted);}
  #search{flex:1; min-width:220px; max-width:480px; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none;}
  #search:focus{border-color:var(--accent);}
  main{flex:1; display:flex; overflow:hidden;}
  #tree-pane{width:46%; min-width:340px; overflow-y:auto; border-right:1px solid var(--border); padding:10px 6px 40px 10px;}
  #detail-pane{flex:1; overflow-y:auto; padding:20px 24px 60px;}
  .node{user-select:none;}
  .node-row{display:flex; align-items:center; gap:6px; padding:3px 6px; border-radius:6px; cursor:pointer; font-size:13px; line-height:1.5;}
  .node-row:hover{background:var(--panel2);}
  .node-row.selected{background:#0c4a6e;}
  .caret{width:16px; text-align:center; color:var(--muted); font-size:10px; flex-shrink:0; transition:transform .15s;}
  .caret.open{transform:rotate(90deg);}
  .caret.empty{visibility:hidden;}
  .node-id{font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--muted); flex-shrink:0;}
  .badge{font-size:9px; padding:1px 6px; border-radius:10px; flex-shrink:0; font-weight:600; letter-spacing:.4px;}
  .badge.leaf{background:#4c1d95; color:#ddd6fe;}
  .badge.familie{background:#14532d; color:#bbf7d0;}
  .badge.nivel{background:#1e3a5f; color:#bae6fd;}
  .badge.subcategorie{background:#713f12; color:#fef3c7;}
  .badge.specialitate{background:#7f1d1d; color:#fecaca;}
  .children{margin-left:18px; border-left:1px dashed #2c3a52; padding-left:4px; display:none;}
  .children.open{display:block;}
  .loading{color:var(--muted); font-size:12px; padding:4px 24px;}
  /* Detail pane */
  #detail-pane .placeholder{color:var(--muted); margin-top:40px; text-align:center; font-size:14px;}
  .crumb{font-size:11px; color:var(--muted); font-family:ui-monospace,Menlo,monospace; margin-bottom:6px; word-break:break-all;}
  .d-title{font-size:19px; font-weight:650; margin-bottom:4px;}
  .d-sub{font-size:12px; color:var(--muted); margin-bottom:16px; display:flex; gap:10px; align-items:center;}
  .section{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:12px;}
  .section h3{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin-bottom:8px;}
  .section p, .section div.txt{font-size:13.5px; line-height:1.65; color:var(--text); white-space:pre-wrap;}
  .kv{font-size:13px; line-height:1.6;}
  .kv b{color:var(--amber);}
  /* P list */
  .p-item{border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden;}
  .p-head{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer; background:var(--panel2); font-size:13px;}
  .p-head:hover{background:#31405c;}
  .p-id{font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--p-col); flex-shrink:0;}
  .p-um{margin-left:auto; font-size:11px; color:var(--green); background:#052e1c; padding:2px 8px; border-radius:10px; flex-shrink:0;}
  .p-caret{color:var(--muted); font-size:10px; transition:transform .15s;}
  .p-caret.open{transform:rotate(90deg);}
  .prm-list{display:none; padding:8px 14px 12px; background:var(--bg);}
  .prm-list.open{display:block;}
  .prm-item{padding:7px 0; border-bottom:1px solid #1c2942; font-size:12.5px;}
  .prm-item:last-child{border-bottom:none;}
  .prm-name{color:var(--text); font-weight:600;}
  .prm-id{font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--muted); margin-left:6px;}
  .prm-tip{font-size:10px; color:var(--amber); margin-left:6px;}
  .prm-vals{color:var(--muted); margin-top:3px; line-height:1.5;}
  /* Search results */
  #search-results{display:none; padding:6px 10px;}
  .sr-item{padding:6px 10px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; gap:8px; align-items:baseline;}
  .sr-item:hover{background:var(--panel2);}
  .sr-count{font-size:11px; color:var(--muted); padding:6px 10px;}
  /* Editare */
  .editswitch{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; user-select:none;}
  .editswitch input{accent-color:var(--accent); width:15px; height:15px; cursor:pointer;}
  .editswitch.on{color:var(--amber); font-weight:600;}
  .btn{border:1px solid var(--border); background:var(--panel2); color:var(--text); font-size:11.5px; padding:4px 10px; border-radius:7px; cursor:pointer; line-height:1.4;}
  .btn:hover{border-color:var(--accent); color:var(--accent);}
  .btn.danger:hover{border-color:#f87171; color:#f87171;}
  .btn.primary{background:#0c4a6e; border-color:#0369a1;}
  .btn.mini{font-size:10.5px; padding:2px 7px; border-radius:6px;}
  .editbar{display:flex; gap:8px; margin:2px 0 10px;}
  .p-del{margin-left:8px;}
  .prm-actions{display:flex; gap:6px; margin-top:5px;}
  .prm-addbar{display:flex; gap:8px; padding:8px 0 2px;}
  /* Modal */
  #modal-overlay{display:none; position:fixed; inset:0; background:rgba(2,6,23,.72); z-index:50; align-items:flex-start; justify-content:center; padding:60px 16px;}
  #modal-overlay.open{display:flex;}
  .modal{background:var(--panel); border:1px solid var(--border); border-radius:12px; width:min(640px,96vw); max-height:78vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .modal h2{font-size:14px; padding:14px 16px 10px; color:var(--accent); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
  .modal h2 .btn{font-weight:400;}
  .modal .m-body{padding:14px 16px; overflow-y:auto; font-size:13px;}
  .modal input[type=text], .modal select, .modal textarea{width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; margin:4px 0 10px;}
  .modal input:focus, .modal textarea:focus{border-color:var(--accent);}
  .modal label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}
  .m-results .sr-item{border:1px solid transparent;}
  .m-results .sr-item:hover{border-color:var(--accent);}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 10px; min-height:26px;}
  .chip{background:#0c4a6e; border:1px solid #0369a1; border-radius:14px; font-size:11px; padding:3px 9px; display:flex; align-items:center; gap:6px;}
  .chip b{color:#7dd3fc; font-weight:600; font-family:ui-monospace,Menlo,monospace; font-size:10px;}
  .chip span.x{cursor:pointer; color:var(--muted);} .chip span.x:hover{color:#f87171;}
  .m-foot{padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end;}
  .hint{font-size:11px; color:var(--muted); margin-bottom:8px; line-height:1.5;}
  #toast{position:fixed; bottom:18px; right:18px; z-index:99; display:flex; flex-direction:column; gap:8px; align-items:flex-end;}
  .toast-item{background:#052e1c; border:1px solid #34d399; color:#d1fae5; font-size:12.5px; padding:9px 14px; border-radius:9px; max-width:420px; box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .toast-item.err{background:#450a0a; border-color:#f87171; color:#fecaca;}
  ::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-thumb{background:#334155; border-radius:6px;} ::-webkit-scrollbar-track{background:transparent;}
  @media (max-width:860px){ main{flex-direction:column;} #tree-pane{width:100%; height:45%; border-right:none; border-bottom:1px solid var(--border);} }
</style>
</head>
<body>
<header>
  <h1>QUADRA &mdash; Taxonomie categorii de constructii</h1>
  <input id="search" type="text" placeholder="Cauta dupa denumire sau ID (min 3 caractere)..." autocomplete="off">
  <span class="stats" id="stats">se incarca...</span>
  <label class="editswitch" id="edit-switch"><input type="checkbox" id="edit-toggle"> Editare</label>
</header>
<div id="modal-overlay"></div>
<div id="toast"></div>
<main>
  <div id="tree-pane">
    <div id="search-results"></div>
    <div id="tree-root"></div>
  </div>
  <div id="detail-pane"><div class="placeholder">&#9668; Selecteaza un nod din arbore pentru a vedea detaliile.<br><br>Extinde cu sagetile, cauta sus, iar la leafuri da click pe un P pentru parametri.</div></div>
</main>
<script>
const SB_URL = 'https://enlzznpzkdhbdsxffavf.supabase.co/rest/v1';
const SB_KEY = 'sb_publishable_4gcOldftRt1fav-gQGXBwg_VnakQ3t1';
const HDRS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY };

async function q(path){
  const r = await fetch(SB_URL + path, { headers: HDRS });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
let PIN = localStorage.getItem('quadra_pin') || '';
async function rpc(fn, args){
  const a = Object.assign({}, args||{});
  if(fn.indexOf('edit_')===0 && fn.indexOf('edit_cauta')!==0) a._pin = PIN;
  const r = await fetch(`${SB_URL}/rpc/${fn}`, { method:'POST', headers:{...HDRS,'Content-Type':'application/json'}, body: JSON.stringify(a) });
  const txt = await r.text();
  if(!r.ok){
    let m=txt; try{ m=JSON.parse(txt).message||txt; }catch(e){}
    m = m.replace(/^.*?:\s*/,'');
    if(m.indexOf('PIN de editare invalid')>=0){ PIN=''; localStorage.removeItem('quadra_pin'); }
    throw new Error(m);
  }
  try{ return JSON.parse(txt); }catch(e){ return txt; }
}
// ---- Editare: stare + utilitare UI ----
let EDIT = false, currentId = null;
const editToggle = document.getElementById('edit-toggle');
editToggle.addEventListener('change', ()=>{
  if(editToggle.checked && !PIN){
    const v = prompt('PIN de editare (scrierile in baza sunt protejate):');
    if(!v){ editToggle.checked = false; return; }
    PIN = v.trim(); localStorage.setItem('quadra_pin', PIN);
  }
  EDIT = editToggle.checked;
  document.getElementById('edit-switch').classList.toggle('on', EDIT);
  if(currentId) showDetail(currentId);
});
function toast(msg, isErr){
  const t=document.createElement('div'); t.className='toast-item'+(isErr?' err':''); t.textContent=msg;
  document.getElementById('toast').appendChild(t);
  setTimeout(()=>t.remove(), isErr?7000:3800);
}
const overlay = document.getElementById('modal-overlay');
function closeModal(){ overlay.classList.remove('open'); overlay.innerHTML=''; }
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
function showModal(title, bodyHTML, footHTML){
  overlay.innerHTML = `<div class="modal"><h2>${title}<button class="btn mini" id="m-close">inchide</button></h2>
    <div class="m-body">${bodyHTML}</div>${footHTML?`<div class="m-foot">${footHTML}</div>`:''}</div>`;
  overlay.classList.add('open');
  document.getElementById('m-close').onclick = closeModal;
  return overlay.querySelector('.modal');
}
function wireSearch(inputEl, resultsEl, searchFn, rowHTML, onPick){
  let timer=null;
  inputEl.addEventListener('input', ()=>{
    clearTimeout(timer);
    const v=inputEl.value.trim();
    if(v.length<2){ resultsEl.innerHTML='<div class="hint">scrie minim 2 caractere...</div>'; return; }
    timer=setTimeout(async ()=>{
      resultsEl.innerHTML='<div class="loading">se cauta...</div>';
      try{
        const rows = await searchFn(v);
        resultsEl.innerHTML = rows.length ? rows.map(rowHTML).join('') : '<div class="hint">nimic gasit</div>';
        resultsEl.querySelectorAll('.sr-item').forEach((el,i)=> el.onclick = ()=> onPick(rows[i]));
      }catch(err){ resultsEl.innerHTML='<div class="hint">eroare: '+esc(err.message)+'</div>'; }
    }, 280);
  });
  inputEl.focus();
}
// multi-picker de parametri (>=2), cu optiunea de a defini PRM noi (create la confirmare)
function pickParams(titlu, onDone){
  const m = showModal(titlu, `
    <div class="hint">Alege minim 2 parametri pentru acest P: cauta in dictionar si da click, sau defineste unul nou. Parametrii noi se creeaza la confirmare.</div>
    <div class="chips" id="mp-chips"></div>
    <label>Cauta parametru existent</label>
    <input type="text" id="mp-q" placeholder="ex: material, diametru, culoare...">
    <div class="m-results" id="mp-res"></div>
    <div style="margin-top:10px"><button class="btn" id="mp-new">+ defineste parametru NOU</button></div>
    <div id="mp-newform" style="display:none; border:1px solid var(--border); border-radius:9px; padding:10px; margin-top:8px;">
      <label>Denumire parametru nou</label><input type="text" id="np-den">
      <label>Tip</label><select id="np-tip"><option value="lista deschisa">lista deschisa (+ alta valoare)</option><option value="lista">lista inchisa</option></select>
      <label>UM (optional: mm, cm, m, kW...)</label><input type="text" id="np-um">
      <label>Valori (separate cu / )</label><input type="text" id="np-val" placeholder="ex: mica / medie / mare">
      <button class="btn primary" id="np-add">adauga la lista</button>
    </div>`,
    `<button class="btn" id="mp-cancel">renunta</button><button class="btn primary" id="mp-ok">gata (foloseste parametrii alesi)</button>`);
  const chips=[]; const chipsEl=m.querySelector('#mp-chips');
  function renderChips(){
    chipsEl.innerHTML = chips.map((c,i)=>`<div class="chip"><b>${esc(c.prm_id||'NOU')}</b> ${esc(c.denumire)} <span class="x" data-i="${i}">&#10005;</span></div>`).join('') || '<span class="hint">niciun parametru ales inca</span>';
    chipsEl.querySelectorAll('.x').forEach(x=> x.onclick=()=>{ chips.splice(+x.dataset.i,1); renderChips(); });
  }
  renderChips();
  wireSearch(m.querySelector('#mp-q'), m.querySelector('#mp-res'),
    v=>rpc('edit_cauta_prm',{q:v}),
    r=>`<div class="sr-item"><span class="node-id">${esc(r.prm_id)}</span><span>${esc(r.denumire)}</span><span class="prm-tip">${esc(r.tip||'')}</span></div>`,
    r=>{ if(!chips.some(c=>c.prm_id===r.prm_id)){ chips.push(r); renderChips(); } });
  m.querySelector('#mp-new').onclick = ()=>{ const f=m.querySelector('#mp-newform'); f.style.display = f.style.display==='none'?'block':'none'; };
  m.querySelector('#np-add').onclick = ()=>{
    const den=m.querySelector('#np-den').value.trim(), tip=m.querySelector('#np-tip').value,
          um=m.querySelector('#np-um').value.trim(), val=m.querySelector('#np-val').value.trim();
    if(den.length<3 || !val){ toast('Completeaza denumirea si valorile parametrului nou.', true); return; }
    chips.push({nou:true, denumire:den, tip, um, valori:val}); renderChips();
    ['#np-den','#np-um','#np-val'].forEach(s=>m.querySelector(s).value='');
  };
  m.querySelector('#mp-cancel').onclick = closeModal;
  m.querySelector('#mp-ok').onclick = async ()=>{
    if(chips.length<2){ toast('Alege minim 2 parametri (regula E3).', true); return; }
    const ids=[];
    try{
      for(const c of chips){
        if(c.nou){ const id = await rpc('edit_creeaza_prm_simplu',{_denumire:c.denumire,_um:c.um||null,_valori:c.valori,_tip:c.tip}); ids.push(id); }
        else ids.push(c.prm_id);
      }
    }catch(err){ toast('Eroare la crearea parametrilor noi: '+err.message, true); return; }
    closeModal(); onDone(ids);
  };
}
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// sortare naturala pe segmente numerice ale nod_id
function natCmp(a,b){
  const as=a.nod_id.split('.'), bs=b.nod_id.split('.');
  for(let i=0;i<Math.max(as.length,bs.length);i++){
    const x=as[i]||'', y=bs[i]||'';
    const nx=parseInt(x,10), ny=parseInt(y,10);
    if(!isNaN(nx)&&!isNaN(ny)){ if(nx!==ny) return nx-ny; }
    else if(x!==y) return x<y?-1:1;
  }
  return 0;
}

const treeRoot = document.getElementById('tree-root');
const detail = document.getElementById('detail-pane');
const nodeCache = {}; // nod_id -> node data
let selectedRow = null;

function badge(tip){ return `<span class="badge ${tip}">${tip}</span>`; }

function makeNode(n){
  nodeCache[n.nod_id] = n;
  const wrap = document.createElement('div'); wrap.className='node'; wrap.dataset.id=n.nod_id;
  const isLeaf = n.tip==='leaf';
  const row = document.createElement('div'); row.className='node-row';
  row.innerHTML = `<span class="caret ${isLeaf?'empty':''}">&#9654;</span>
    <span class="node-id">${esc(n.nod_id)}</span>
    ${badge(n.tip)}
    <span class="node-name">${esc(n.denumire)}</span>`;
  const kids = document.createElement('div'); kids.className='children';
  wrap.appendChild(row); wrap.appendChild(kids);

  row.addEventListener('click', async (e)=>{
    selectNode(row, n.nod_id);
    if(isLeaf) return;
    const caret = row.querySelector('.caret');
    if(kids.classList.contains('open')){ kids.classList.remove('open'); caret.classList.remove('open'); return; }
    caret.classList.add('open'); kids.classList.add('open');
    if(!kids.dataset.loaded){
      kids.innerHTML = '<div class="loading">se incarca...</div>';
      await loadChildren(n.nod_id, kids);
    }
  });
  return wrap;
}

async function loadChildren(parentId, container){
  try{
    const rows = await q(`/viz_noduri?parinte_id=eq.${encodeURIComponent(parentId)}&select=nod_id,parinte_id,tip,denumire&limit=2000`);
    rows.sort(natCmp);
    container.innerHTML=''; container.dataset.loaded='1';
    rows.forEach(n=>container.appendChild(makeNode(n)));
    if(!rows.length) container.innerHTML='<div class="loading">fara copii</div>';
  }catch(err){ container.innerHTML='<div class="loading">eroare: '+esc(err.message)+'</div>'; }
}

function selectNode(row, id){
  if(selectedRow) selectedRow.classList.remove('selected');
  selectedRow = row; row.classList.add('selected');
  showDetail(id);
}

async function showDetail(id){
  currentId = id;
  detail.innerHTML = '<div class="placeholder">se incarca...</div>';
  try{
    let n = nodeCache[id];
    if(!n || n.descriere===undefined){
      const rows = await q(`/viz_noduri?nod_id=eq.${encodeURIComponent(id)}&select=*`);
      n = rows[0]; nodeCache[id]=n;
    }
    // lant complet (parintii)
    let crumbs=[], cur=n;
    const guard = 15;
    let hops=0;
    let pid = n.parinte_id;
    let chain=[n.denumire];
    while(pid && hops<guard){
      let p = nodeCache[pid];
      if(!p || p.denumire===undefined){
        const rows = await q(`/viz_noduri?nod_id=eq.${encodeURIComponent(pid)}&select=nod_id,parinte_id,tip,denumire`);
        p=rows[0]; if(p) nodeCache[pid]=Object.assign(nodeCache[pid]||{},p);
      }
      if(!p) break;
      chain.unshift(p.denumire);
      pid=p.parinte_id; hops++;
    }
    let html = `<div class="crumb">${esc(chain.join('  ›  '))}</div>
      <div class="d-title">${esc(n.denumire)}</div>
      <div class="d-sub"><span class="node-id">${esc(n.nod_id)}</span> ${badge(n.tip)}
        <span>${esc(n.status_generare||'')}${n.status_inchidere?' · '+esc(n.status_inchidere):''}</span></div>`;
    if(n.descriere) html += `<div class="section"><h3>Descriere</h3><p>${esc(n.descriere)}</p></div>`;
    const kv=[];
    if(n.sinonime) kv.push(`<b>Sinonime:</b> ${esc(n.sinonime)}`);
    if(n.include_) kv.push(`<b>Include:</b> ${esc(n.include_)}`);
    if(n.exclude_) kv.push(`<b>Exclude:</b> ${esc(n.exclude_)}`);
    if(n.criteriu_asociere) kv.push(`<b>Criteriu de asociere:</b> ${esc(n.criteriu_asociere)}`);
    if(kv.length) html += `<div class="section"><h3>Asociere</h3><div class="kv">${kv.join('<br><br>')}</div></div>`;

    if(n.tip==='leaf'){
      html += `<div class="section"><h3>P-uri (lista de cantitati)</h3><div id="p-editbar"></div><div id="p-list"><div class="loading">se incarca...</div></div></div>`;
      detail.innerHTML = html;
      if(EDIT){
        const bar=document.getElementById('p-editbar'); bar.className='editbar';
        bar.innerHTML = `<button class="btn" id="add-p-exist">+ ataseaza P existent</button><button class="btn primary" id="add-p-new">+ creeaza P nou</button>`;
        document.getElementById('add-p-exist').onclick = ()=> modalAtaseazaP(id);
        document.getElementById('add-p-new').onclick = ()=> modalCreeazaP(id);
      }
      const ps = await q(`/viz_leaf_p?leaf_id=eq.${encodeURIComponent(id)}&select=*&order=pozitie`);
      const plist = document.getElementById('p-list');
      if(!ps.length){ plist.innerHTML='<div class="loading">fara P-uri</div>'; return; }
      plist.innerHTML='';
      ps.forEach(p=>{
        const item=document.createElement('div'); item.className='p-item';
        item.innerHTML=`<div class="p-head"><span class="p-caret">&#9654;</span>
          <span class="p-id">${esc(p.p_id)}</span><span>${esc(p.denumire)}</span>
          <span class="p-um">${esc(p.um||'')}</span>${EDIT?`<button class="btn mini danger p-del" title="scoate P-ul de pe acest leaf">&#10005; scoate</button>`:''}</div>
          <div class="prm-list"><div class="loading">...</div></div>`;
        const head=item.querySelector('.p-head'), list=item.querySelector('.prm-list'), caret=item.querySelector('.p-caret');
        if(EDIT){
          item.querySelector('.p-del').addEventListener('click', async (e)=>{
            e.stopPropagation();
            if(!confirm(`Scot ${p.p_id} "${p.denumire}" de pe leaf-ul ${id}?\n(P-ul ramane in dictionar; parametrii perechii se sterg)`)) return;
            try{ const r = await rpc('edit_sterge_p_de_pe_leaf',{_leaf:id,_p:p.p_id}); toast(r); showDetail(id); }
            catch(err){ toast(err.message, true); }
          });
        }
        head.addEventListener('click', async ()=>{
          if(list.classList.contains('open')){ list.classList.remove('open'); caret.classList.remove('open'); return; }
          list.classList.add('open'); caret.classList.add('open');
          if(!list.dataset.loaded) await renderPrms(list, id, p.p_id);
        });
        plist.appendChild(item);
      });
    } else {
      detail.innerHTML = html;
    }
  }catch(err){ detail.innerHTML='<div class="placeholder">Eroare: '+esc(err.message)+'</div>'; }
}

// ---- Randare parametri per pereche (cu actiuni in modul editare) ----
async function renderPrms(list, leafId, pId){
  try{
    const prms = await q(`/viz_leafp_prm?leaf_id=${encodeURIComponent('eq.'+leafId)}&p_id=${encodeURIComponent('eq.'+pId)}&select=*`);
    list.dataset.loaded='1';
    let inner = prms.length ? prms.map(m=>
      `<div class="prm-item"><span class="prm-name">${esc(m.denumire)}</span><span class="prm-id">${esc(m.prm_id)}</span><span class="prm-tip">${esc(m.tip||'')}</span>
       <div class="prm-vals">${esc(m.valori_lista||'')}</div>
       ${EDIT?`<div class="prm-actions">
          <button class="btn mini" data-act="vals" data-prm="${esc(m.prm_id)}">+ valori</button>
          <button class="btn mini danger" data-act="del" data-prm="${esc(m.prm_id)}">&#10005; sterge parametrul</button>
        </div>`:''}</div>`).join('')
      : '<div class="loading">fara parametri</div>';
    if(EDIT) inner += `<div class="prm-addbar">
        <button class="btn mini" data-act="add-exist">+ parametru existent</button>
        <button class="btn mini primary" data-act="add-new">+ parametru NOU</button></div>`;
    list.innerHTML = inner;
    if(!EDIT) return;
    list.querySelectorAll('[data-act]').forEach(b=>{
      b.onclick = async (e)=>{
        e.stopPropagation();
        const act=b.dataset.act, prm=b.dataset.prm;
        try{
          if(act==='del'){
            if(!confirm(`Sterg parametrul ${prm} de pe perechea (${leafId}, ${pId})?`)) return;
            await rpc('edit_sterge_prm_de_pe_pereche',{_leaf:leafId,_p:pId,_prm:prm});
            toast('Parametru sters.'); list.dataset.loaded=''; await renderPrms(list, leafId, pId);
          } else if(act==='vals'){
            const v = prompt('Valori noi de adaugat la '+prm+' (separate cu / ):');
            if(!v) return;
            await rpc('edit_adauga_valori_prm',{_prm:prm,_valori_noi:v});
            toast('Valori adaugate (inaintea optiunii "alta valoare").'); list.dataset.loaded=''; await renderPrms(list, leafId, pId);
          } else if(act==='add-exist'){
            const m = showModal('Adauga parametru existent pe '+pId, `
              <label>Cauta in dictionarul PRM</label><input type="text" id="ap-q" placeholder="denumire sau PRM-...">
              <div class="m-results" id="ap-res"></div>`);
            wireSearch(m.querySelector('#ap-q'), m.querySelector('#ap-res'),
              v=>rpc('edit_cauta_prm',{q:v}),
              r=>`<div class="sr-item"><span class="node-id">${esc(r.prm_id)}</span><span>${esc(r.denumire)}</span><span class="prm-tip">${esc(r.tip||'')}</span></div>`,
              async r=>{
                try{ await rpc('edit_adauga_prm_pe_pereche',{_leaf:leafId,_p:pId,_prm:r.prm_id});
                  closeModal(); toast(r.prm_id+' adaugat.'); list.dataset.loaded=''; await renderPrms(list, leafId, pId);
                }catch(err){ toast(err.message, true); }
              });
          } else if(act==='add-new'){
            const m = showModal('Parametru NOU pe '+pId, `
              <label>Denumire</label><input type="text" id="cp-den">
              <label>Tip</label><select id="cp-tip"><option value="lista deschisa">lista deschisa (+ alta valoare)</option><option value="lista">lista inchisa</option></select>
              <label>UM (optional)</label><input type="text" id="cp-um" placeholder="mm / cm / kW ...">
              <label>Valori (separate cu / )</label><input type="text" id="cp-val" placeholder="ex: 10 / 15 / 20">`,
              `<button class="btn primary" id="cp-ok">creeaza si ataseaza</button>`);
            m.querySelector('#cp-ok').onclick = async ()=>{
              try{
                const idn = await rpc('edit_creeaza_prm',{_denumire:m.querySelector('#cp-den').value,_um:m.querySelector('#cp-um').value||null,
                  _valori:m.querySelector('#cp-val').value,_tip:m.querySelector('#cp-tip').value,_leaf:leafId,_p:pId});
                closeModal(); toast('Creat si atasat: '+idn); list.dataset.loaded=''; await renderPrms(list, leafId, pId);
              }catch(err){ toast(err.message, true); }
            };
          }
        }catch(err){ toast(err.message, true); }
      };
    });
  }catch(err){ list.innerHTML='<div class="loading">eroare</div>'; }
}
// ---- Modale P pe leaf ----
function modalAtaseazaP(leafId){
  const m = showModal('Ataseaza P existent pe '+leafId, `
    <div class="hint">Cauta P-ul in dictionar. La atasare, parametrii se mostenesc automat de la cel mai folosit leaf al P-ului; daca P-ul nu are parametri de mostenit, ti se cere sa alegi minim 2.</div>
    <label>Cauta P</label><input type="text" id="xp-q" placeholder="denumire, sinonim sau PU-...">
    <div class="m-results" id="xp-res"></div>`);
  wireSearch(m.querySelector('#xp-q'), m.querySelector('#xp-res'),
    v=>rpc('edit_cauta_p',{q:v}),
    r=>`<div class="sr-item"><span class="node-id">${esc(r.p_id)}</span><span>${esc(r.denumire)}</span><span class="p-um">${esc(r.um||'')}</span></div>`,
    async r=>{
      try{
        const res = await rpc('edit_adauga_p_pe_leaf',{_leaf:leafId,_p:r.p_id,_prms:null});
        closeModal(); toast(r.p_id+' atasat: '+res); showDetail(leafId);
      }catch(err){
        if(err.message.indexOf('ALEGE_PARAMETRI')>=0){
          closeModal();
          pickParams('Alege parametrii pentru '+r.p_id+' pe '+leafId, async ids=>{
            try{ const res = await rpc('edit_adauga_p_pe_leaf',{_leaf:leafId,_p:r.p_id,_prms:ids});
              toast(r.p_id+' atasat: '+res); showDetail(leafId);
            }catch(e2){ toast(e2.message, true); }
          });
        } else toast(err.message, true);
      }
    });
}
function modalCreeazaP(leafId){
  const m = showModal('Creeaza P NOU pe '+leafId, `
    <div class="hint">Anti-dublura: daca exista deja un P echivalent, baza te refuza si iti spune ID-ul — foloseste atunci "ataseaza P existent". Dupa completare alegi minim 2 parametri.</div>
    <label>Denumire P</label><input type="text" id="np2-den" placeholder="ex: Grila ventilatie subsol PVC">
    <label>UM</label><select id="np2-um"><option>buc</option><option>mp</option><option>ml</option><option>mc</option><option>kg</option><option>set</option></select>
    <label>Sinonime (optional, separate cu ; )</label><input type="text" id="np2-sin">`,
    `<button class="btn primary" id="np2-next">continua: alege parametrii &raquo;</button>`);
  m.querySelector('#np2-next').onclick = ()=>{
    const den=m.querySelector('#np2-den').value.trim(), um=m.querySelector('#np2-um').value, sin=m.querySelector('#np2-sin').value.trim();
    if(den.length<3){ toast('Denumirea e prea scurta.', true); return; }
    closeModal();
    pickParams('Parametrii pentru P-ul nou "'+den+'"', async ids=>{
      try{
        const idn = await rpc('edit_creeaza_p',{_denumire:den,_um_simbol:um,_sinonime:sin||null,_leaf:leafId,_prms:ids});
        toast('P nou creat si mapat: '+idn); showDetail(leafId);
      }catch(err){ toast(err.message, true); }
    });
  };
}

// Cautare
const searchBox=document.getElementById('search');
const searchResults=document.getElementById('search-results');
let searchTimer=null;
searchBox.addEventListener('input', ()=>{
  clearTimeout(searchTimer);
  const v=searchBox.value.trim();
  if(v.length<3){ searchResults.style.display='none'; treeRoot.style.display='block'; return; }
  searchTimer=setTimeout(()=>doSearch(v), 300);
});
async function doSearch(v){
  searchResults.style.display='block'; treeRoot.style.display='none';
  searchResults.innerHTML='<div class="loading">se cauta...</div>';
  try{
    const enc=encodeURIComponent('%'+v+'%');
    const rows=await q(`/viz_noduri?or=(denumire.ilike.${enc},nod_id.ilike.${enc})&select=nod_id,parinte_id,tip,denumire&limit=200`);
    rows.sort(natCmp);
    searchResults.innerHTML = `<div class="sr-count">${rows.length} rezultate${rows.length===200?' (primele 200)':''} — sterge cautarea pentru arbore</div>` +
      rows.map(n=>`<div class="sr-item" data-id="${esc(n.nod_id)}"><span class="node-id">${esc(n.nod_id)}</span>${badge(n.tip)}<span>${esc(n.denumire)}</span></div>`).join('');
    searchResults.querySelectorAll('.sr-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        const n = rows.find(r=>r.nod_id===el.dataset.id);
        nodeCache[n.nod_id]=Object.assign(nodeCache[n.nod_id]||{},n);
        if(selectedRow) selectedRow.classList.remove('selected');
        el.classList.add('selected'); selectedRow=el;
        showDetail(n.nod_id);
      });
    });
  }catch(err){ searchResults.innerHTML='<div class="loading">eroare: '+esc(err.message)+'</div>'; }
}

// Init: radacinile (parinte_id null) + statistici
(async ()=>{
  try{
    const roots = await q('/viz_noduri?parinte_id=is.null&select=nod_id,parinte_id,tip,denumire&limit=50');
    roots.sort(natCmp);
    roots.forEach(n=>treeRoot.appendChild(makeNode(n)));
    const cnt = await fetch(SB_URL+'/viz_noduri?tip=eq.leaf&select=nod_id&limit=1', {headers:{...HDRS, Prefer:'count=exact'}});
    const total = cnt.headers.get('content-range')?.split('/')[1] || '?';
    document.getElementById('stats').textContent = total + ' leafuri in taxonomie';
  }catch(err){
    treeRoot.innerHTML='<div class="loading">Eroare la conectare: '+esc(err.message)+'</div>';
    document.getElementById('stats').textContent='eroare';
  }
})();
